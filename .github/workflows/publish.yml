name: 自动发布
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 从 csproj 读版本号
      - id: get_version
        shell: pwsh
        run: |
          [xml]$project = Get-Content src/ExModem.csproj
          $ver = ($project.Project.PropertyGroup.Version | Where-Object { $_ }) -join ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      # 版本对应的 tag 已存在(或带 beta)则跳过本次发布
      - id: check_tag
        shell: pwsh
        run: |
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          $tag = "V$ver"
          if ((git tag -l $tag) -or ($ver -like "*beta*")) {
            echo "EXISTS=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "EXISTS=false" >> $env:GITHUB_OUTPUT
          }

      - if: steps.check_tag.outputs.EXISTS == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 框架依赖发布:dotnet publish 会自动跑 illink 裁剪 + 字体 dll 替换 + 清理(见 ExModem.csproj 的 publish 目标)。
      # 先发布默认架构(x64 宿主程序),再单独发布 arm64 以取得 arm64 的 ExModem.exe(托管 dll 两者相同,只换宿主程序)。
      - if: steps.check_tag.outputs.EXISTS == 'false'
        shell: pwsh
        run: |
          dotnet publish src/ExModem.csproj -c Release --self-contained false -o publish_portable
          dotnet publish src/ExModem.csproj -c Release --self-contained false -r win-arm64 -o temp_arm64

      # 打包:x64 包 = 默认发布;arm64 包 = 默认发布但替换为 arm64 的 ExModem.exe
      - if: steps.check_tag.outputs.EXISTS == 'false'
        shell: pwsh
        run: |
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          Copy-Item -Path "./publish_portable" -Destination "./dist_x64" -Recurse
          Compress-Archive -Path ./dist_x64/* -DestinationPath "ExModem_$($ver)_x64.zip" -Force
          Copy-Item -Path "./publish_portable" -Destination "./dist_arm64" -Recurse
          Remove-Item "./dist_arm64/ExModem.exe" -Force
          Copy-Item -Path "./temp_arm64/ExModem.exe" -Destination "./dist_arm64/ExModem.exe"
          Compress-Archive -Path ./dist_arm64/* -DestinationPath "ExModem_$($ver)_arm64.zip" -Force

      - if: steps.check_tag.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "V${{ steps.get_version.outputs.VERSION }}"
          name: "V${{ steps.get_version.outputs.VERSION }}"
          files: |
            ExModem_${{ steps.get_version.outputs.VERSION }}_x64.zip
            ExModem_${{ steps.get_version.outputs.VERSION }}_arm64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
